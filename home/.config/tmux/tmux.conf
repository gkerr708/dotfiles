##### General
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -g mouse on
set -g history-limit 10000
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
setw -g synchronize-panes off

##### Status bar (top, transparent, white text)
set -g status-position top
set -g status-style bg=default,fg=white
set -g window-status-style         bg=default,fg=white
set -g window-status-current-style bg=default,fg=brightwhite,bold
set -g window-status-format ''
set -g window-status-current-format ''

##### Prefix (Ctrl-Space)
unbind C-b
set -g prefix M-l 
bind M-l send-prefix

##### Git + Python (left) and prefix indicator+path+clock+session (right)
set -g status-interval 2
set -g status-left-length 400
set -g status-right-length 400
set -g status-left  '<#S> <#I|#W> #(cd "#{pane_current_path}" && bash ~/.config/tmux/git.sh) #(cd "#{pane_current_path}" && bash ~/.config/tmux/python.sh) '
#set -g status-right '#{prefix_highlight} #{pane_current_path} #S'
set -g status-right '#{prefix_highlight} #{pane_current_path}'
set -g status-left-style  bg=default,fg=white
set -g status-right-style bg=default,fg=white

##### Allow passthrough 
set -g allow-passthrough on

##### Better CWD behavior (new windows/splits inherit path)
bind c  new-window  -c "#{pane_current_path}"
unbind '"'
bind '"' split-window -v -c "#{pane_current_path}"
unbind %
bind %  split-window -h -c "#{pane_current_path}"

##### Fast navigation / housekeeping
set -g renumber-windows on
bind -n M-Left  previous-window
bind -n M-Right next-window
bind R respawn-pane -k -c "#{pane_current_path}"
bind t choose-tree -Zw

##### UI responsiveness / focus
set -s escape-time 0
set -g focus-events on
set -g aggressive-resize on
set -g display-time 800

##### Pane borders
set -g pane-border-style        fg=brightblack
set -g pane-active-border-style fg=white

##### Copy mode (Wayland clipboard)
unbind -T copy-mode-vi y
bind   -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# --- Window hotkeys on left home row (WITH prefix) ---
# remove global grabs
unbind -n a; unbind -n s; unbind -n d; unbind -n f; unbind -n g
# free the default tmux bindings that used these keys
unbind s    # default: choose-session
unbind d    # default: detach-client
unbind f    # default: find-window
# Prefix + a/s/d/f/g -> windows 1..5
bind a select-window -t :1
bind s select-window -t :2
bind d select-window -t :3
bind f select-window -t :4
bind g select-window -t :5

# --- Rebind capitals to restore original tmux functions ---
bind A last-window                   # default: toggle between last two windows
bind S choose-session                # default function for 's'
bind D detach-client                 # default function for 'd'
bind F command-prompt "find-window '%%'"   # default function for 'f'
bind G next-window                   # optional (no default on 'g', added for symmetry)

##### Vim-like pane nav/resize
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Copy mode extras
bind n copy-mode
bind -T copy-mode-vi i send -X cancel
bind -T copy-mode-vi v send -X begin-selection

##### Reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

##### Plugins (must be BEFORE TPM run)
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'white'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
#set -g @plugin 'tmux-plugins/tmux-resurrect'
#set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g @continuum-restore 'off'


##### TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
