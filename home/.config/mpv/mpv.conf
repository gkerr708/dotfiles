############################################
# mpv.conf — audiobook / podcast focused
# Arch Linux + Wayland safe
############################################

# --- Resume playback ---
save-position-on-quit=no

# --- Output ---
ao=pipewire

# --- Playback controls (useful for speech) ---
speed=1.0

# --- Seeking ---
# Keep seeks precise for long files
hr-seek=yes
hr-seek-demuxer-offset=0

# --- Silence + errors ---
terminal=yes
msg-level=all=warn,ffmpeg=no

really-quiet=yes

# --- Video (enabled by default) ---
vo=gpu
gpu-context=wayland
hwdec=auto-safe

############################################
# Keybindings (defaults retained)
############################################
# q            quit (saves position)
# ← / →        seek ±5s
# Shift+←/→    seek ±1s
# [ / ]        speed down / up
############################################
